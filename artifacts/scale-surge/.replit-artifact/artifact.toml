kind = "web"
previewPath = "/"
title = "Scale Surge"
version = "1.0.0"
id = "artifacts/scale-surge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20507

[services.development]
run = "pnpm --filter @workspace/scale-surge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scale-surge", "run", "build" ]
publicDir = "artifacts/scale-surge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20507"
BASE_PATH = "/"
